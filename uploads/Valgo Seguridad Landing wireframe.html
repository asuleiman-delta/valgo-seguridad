  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:14px; cursor:pointer; box-shadow:0 2px 10px rgba(201,150,47,0.35);\">Solicitar Cotización<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section id=\"top\" style=\"position:relative; background:#0B1E3D; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0; background:#0B1E3D; background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 16px);\"><\u002Fdiv>\n    <div style=\"position:absolute; inset:0; background:linear-gradient(105deg, rgba(8,22,46,0.97) 0%, rgba(9,24,50,0.92) 48%, rgba(11,30,61,0.62) 100%);\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1200px; margin:0 auto; padding:64px 28px 76px; display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; align-items:center;\">\n\n      <!-- Columna izquierda: propuesta de valor -->\n      <div>\n        <div style=\"display:inline-flex; align-items:center; gap:10px; background:rgba(201,150,47,0.14); border:1px solid rgba(201,150,47,0.4); color:#E2B65A; padding:7px 14px; border-radius:100px; font-size:12.5px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;\">\n          <span style=\"display:inline-block; width:18px; height:3px; background:#0A3D91;\"><\u002Fspan>\n          <span style=\"display:inline-block; width:18px; height:3px; background:#fff;\"><\u002Fspan>\n          <span style=\"display:inline-block; width:18px; height:3px; background:#C8302A;\"><\u002Fspan>\n          Operador de Seguridad Industrial\n        <\u002Fdiv>\n        <h1 style=\"color:#fff; font-size:50px; line-height:1.08; font-weight:800; letter-spacing:-0.02em; margin:22px 0 0; text-wrap:balance;\">Seguridad industrial con respaldo normativo para tu empresa<\u002Fh1>\n        <p style=\"color:#C2CCDC; font-size:18px; line-height:1.7; margin:22px 0 0; max-width:540px;\">Operamos bodegas logísticas, plantas industriales, edificios corporativos y más. Personal certificado <strong style=\"color:#fff; font-weight:700;\">OS-10<\u002Fstrong>, cumplimiento total de la nueva Ley de Seguridad y supervisión permanente en terreno.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:14px 26px; margin-top:30px;\">\n          <div style=\"display:flex; align-items:center; gap:9px; color:#E7ECF4; font-size:14.5px; font-weight:600;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7\" stroke=\"#C9962F\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Certificación OS-10<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; color:#E7ECF4; font-size:14.5px; font-weight:600;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7\" stroke=\"#C9962F\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Cobertura Nacional<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; color:#E7ECF4; font-size:14.5px; font-weight:600;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7\" stroke=\"#C9962F\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>+15 años de experiencia<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Columna derecha: formulario -->\n      <div id=\"hero-form\" style=\"background:#FFFFFF; border-radius:14px; box-shadow:0 30px 70px rgba(3,12,30,0.5); padding:30px 30px 28px;\">\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <h2 style=\"font-size:21px; font-weight:800; margin:0; color:#0B1E3D; letter-spacing:-0.01em;\">Solicita tu cotización sin costo<\u002Fh2>\n          <p style=\"font-size:13.5px; color:#64708A; margin:7px 0 20px;\">Respuesta de un asesor en menos de 24 horas hábiles.<\u002Fp>\n          <form onsubmit=\"{{ onSubm :pointer;\" style-hover=\"border-color:#0B1E3D;\">Enviar otra solicitud<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BLOQUE 2: PILARES DE CONFIANZA -->\n  <section id=\"confianza\" style=\"background:#F8F9FC; padding:74px 28px;\">\n    <div style=\"max-width:1200px; margin:0 auto;\">\n      <div style=\"max-width:680px;\">\n        <span style=\"font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#C9962F;\">Respaldo institucional<\u002Fspan>\n        <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-0.02em; margin:12px 0 0; color:#0B1E3D; text-wrap:balance;\">Respaldo normativo verificable en cada servicio<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:22px; margin-top:42px;\">\n\n        <div style=\"background:#fff; border:1px solid #E7EBF2; border-radius:8px; padding:26px 24px; border-top:3px solid #0B1E3D;\">\n          <div style=\"width:46px; height:46px; border-radius:8px; background:#0B1E3D; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7\" stroke=\"#C9962F\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-size:17px; font-weight:800; margin:0 0 9px; color:#0B1E3D; line-height:1.25;\">Personal certificado OS-10<\u002Fh3>\n          <p style=\"font-size:14px; color:#5A6680; line-height:1.65; margin:0;\">Guardias con capacitación certificada por la Autoridad Fiscalizadora OS-10. Selección rigurosa, exámenes médicos vigentes y supervisión periódica en terreno.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E7EBF2; border-radius:8px; padding:26px 24px; border-top:3px solid #0B1E3D;\">\n          <div style=\"width:46px; height:
